<section class="topbar">
  <div>
    <p class="eyebrow">Job Skill Extractor</p>
    <h1>Generate structured skills JSON from a job description</h1>
  </div>
</section>

<section class="input-grid single-input">
  <div class="panel">
    <div class="panel-heading">
      <h2>Job description</h2>
      <label class="file-control">
        <span>Upload</span>
        <input type="file" accept=".txt,text/plain" (change)="uploadJobDescription($event)">
      </label>
    </div>
    <textarea [value]="jobDescriptionText" (change)="updateJobDescriptionText($event)" spellcheck="false"></textarea>

    <label class="check-row">
      <input type="checkbox" [(ngModel)]="saveJobProfile">
      <span>Save extracted profile</span>
    </label>
    <button class="primary-button" type="button" [disabled]="loading" (click)="extractSkills()">Extract skills</button>
  </div>
</section>

<section class="status-row" *ngIf="loading || errorMessage">
  <div class="status loading" *ngIf="loading">{{ loadingLabel }}...</div>
  <div class="status error" *ngIf="errorMessage">{{ errorMessage }}</div>
</section>

<section class="panel json-panel" *ngIf="extractionResult">
  <div class="panel-heading">
    <h2>Extracted job profile</h2>
    <button class="ghost-button" type="button" (click)="download()">Download JSON</button>
  </div>
  <p *ngIf="extractionResult.saved_path">Saved at {{ extractionResult.saved_path }}</p>
  <pre>{{ extractionResult.job_profile | json }}</pre>
</section>
