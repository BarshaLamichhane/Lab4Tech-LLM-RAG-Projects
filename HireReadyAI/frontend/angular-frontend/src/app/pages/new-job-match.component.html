<section class="topbar">
  <div>
    <p class="eyebrow">New Job Match</p>
    <h1>Compare a candidate CV with a newly uploaded job description</h1>
  </div>
</section>

<section class="input-grid">
  <div class="panel">
    <div class="panel-heading">
      <h2>Candidate CV</h2>
      <label class="file-control">
        <span>Upload</span>
        <input type="file" accept=".txt,.pdf,application/pdf,text/plain" (change)="uploadCv($event)">
      </label>
    </div>
    <textarea [value]="cvText" (change)="updateCvText($event)" spellcheck="false"></textarea>
  </div>

  <div class="panel">
    <div class="panel-heading">
      <h2>Job description</h2>
      <label class="file-control">
        <span>Upload</span>
        <input type="file" accept=".txt,text/plain" (change)="uploadJobDescription($event)">
      </label>
    </div>
    <textarea [value]="jobDescriptionText" (change)="updateJobDescriptionText($event)" spellcheck="false"></textarea>

    <label class="check-row">
      <input type="checkbox" [(ngModel)]="saveNewJobProfile">
      <span>Save extracted profile</span>
    </label>
    <button class="primary-button" type="button" [disabled]="loading" (click)="calculateMatch(false)">Calculate match</button>
    <button class="ghost-button full-width action-gap" type="button" [disabled]="loading || !matchResult" (click)="calculateMatch(true)">
      Show other fit
    </button>
  </div>
</section>

<section class="status-row" *ngIf="loading || errorMessage">
  <div class="status loading" *ngIf="loading">{{ loadingLabel }}...</div>
  <div class="status error" *ngIf="errorMessage">{{ errorMessage }}</div>
</section>

<app-match-result *ngIf="matchResult" [result]="matchResult" />
